<!doctype html>
<html>
  <head>
    <title>Sticky Notes</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body
    style="
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      min-height: 100vh;
    "
  >
    <nav class="navbar navbar-dark bg-dark px-4">
      <a class="navbar-brand text-white" href="/notes/">Sticky Notes</a>

      <div>
        {% if messages %} {% for message in messages %}
        <div class="alert alert-{{ message.tags }} mt-3">{{ message }}</div>
        {% endfor %} {% endif %} {% if user.is_authenticated %}
        <span class="text-white me-3">Welcome, {{ user.username }}</span>
        <form action="/logout/" method="post" style="display: inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-light btn-sm">
            Logout
          </button>
        </form>
        {% else %}
        <a class="btn btn-outline-light btn-sm" href="/login/">Login</a>
        {% endif %}
      </div>
    </nav>

    <div class="container mt-5">{% block content %}{% endblock %}</div>
  </body>
</html>
